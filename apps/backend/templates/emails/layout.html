<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title><%= subject %></title>
  <!--[if mso]>
  <style type="text/css">
    body, table, td {font-family: Arial, Helvetica, sans-serif !important;}
  </style>
  <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f0f4f5; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f0f4f5;">
    <tr>
      <td align="center" style="padding: 20px;">
        <table role="presentation" width="520" cellpadding="0" cellspacing="0" border="0" style="max-width: 520px; width: 100%;">
          
          <!-- Header -->
          <tr>
            <td>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: <%= headerColor %>; border-radius: 12px 12px 0 0;">
                <tr>
                  <td align="center" style="padding: 24px 20px;">
                    <h1 style="margin: 0 0 4px 0; font-size: 20px; font-weight: 700; color: #ffffff; font-family: Arial, sans-serif;">
                      <%= title %>
                    </h1>
                    <p style="margin: 0; font-size: 13px; color: rgba(255,255,255,0.85); font-family: Arial, sans-serif;">
                      <%= subtitle %>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Main Content -->
          <tr>
            <td>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-left: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb;">
                <tr>
                  <td style="padding: 24px 20px;">
                    <%- body %>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f9fafb; border-radius: 0 0 12px 12px; border: 1px solid #e5e7eb; border-top: none;">
                <tr>
                  <td align="center" style="padding: 16px 20px;">
                    <p style="margin: 0 0 6px 0; font-size: 12px; color: #9ca3af; font-family: Arial, sans-serif;">
                      &#27492;&#37038;&#20214;&#30001;&#31995;&#32479;&#33258;&#21160;&#21457;&#36865;&#65292;&#35831;&#21247;&#30452;&#25509;&#22238;&#22797;
                    </p>
                    <p style="margin: 0; font-size: 11px; color: #d1d5db; font-family: Arial, sans-serif;">
                      &#21457;&#36865;&#26102;&#38388;&#65306;<%= sentAt %>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
